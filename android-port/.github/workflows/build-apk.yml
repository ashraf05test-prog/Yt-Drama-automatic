name: Build debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify bundled binaries
        run: |
          set -e
          echo "== ABI assets =="
          ls -la app/src/main/assets/bin/armeabi-v7a/ app/src/main/assets/bin/arm64-v8a/
          file app/src/main/assets/bin/armeabi-v7a/yt-dlp || true
          file app/src/main/assets/bin/arm64-v8a/yt-dlp || true
          echo "== FFmpegKit AAR =="
          ls -la app/libs/
          test -s app/libs/ffmpeg-kit-full-gpl-6.0-2.LTS.aar
          echo "== yt-dlp size sanity (must be > 1 MB each) =="
          test "$(stat -c%s app/src/main/assets/bin/armeabi-v7a/yt-dlp)" -gt 1000000
          test "$(stat -c%s app/src/main/assets/bin/arm64-v8a/yt-dlp)"   -gt 1000000

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoTransform-debug-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
